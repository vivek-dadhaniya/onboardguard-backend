name: Spring Boot CI Build

# 1. Triggers: When should this pipeline run?
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    # 2. Operating System: Run on the latest Ubuntu server
    runs-on: ubuntu-latest

    steps:
      # 3. Checkout: Pulls your repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 4. Setup Java: Configures JDK 17 and enables Maven caching
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Standard enterprise JDK distribution
          cache: 'maven'          # Speeds up subsequent builds drastically

      # 5. Permissions: Ensures the Maven wrapper script can be executed on Linux
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # 6. Build & Test: Compiles the code and runs all unit/integration tests
      - name: Build and Test with Maven
        run: ./mvnw clean verify